title: "Outlier Severity Study for Robust 3D Trajectory Reconstruction"

seeds: [0, 1, 2, 3, 4]

data:
  num_points: 200
  t_max: 12.566370614359172
  noise_std: 0.03
  outlier_indices: [30, 80, 130, 170]
  outlier_magnitude: 4.0
  outlier_ratio: 0.02
  random_outlier_positions: true

model:
  hidden_width: 128

loss:
  default_huber_delta: 0.5
  endpoint_weight: 10.0
  smoothness_weight: 1.0

training:
  epochs: 8000
  lr: 0.003
  weight_decay: 1.0e-5
  early_stopping:
    enabled: false
    patience: 600
    min_delta: 1.0e-8

output:
  results_dir: "results"
  save_checkpoints: false

experiments:
  main_comparison:
    enabled: false
    depth: 3
    huber_delta: 0.5
  delta_sensitivity:
    enabled: false
    depth: 3
    deltas: [0.1, 0.5, 1.0]
  depth_sensitivity:
    enabled: false
    depths: [2, 3, 5]
    losses: ["mse", "huber"]
    huber_delta: 0.5
  outlier_study:
    enabled: true
    depth: 3
    losses: ["mse", "huber"]
    huber_delta: 0.5
    magnitudes: [1.5, 3.0, 6.0]
    ratios: [0.01, 0.02, 0.05, 0.1]
    random_positions: true
